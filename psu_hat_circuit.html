<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSU HAT — circuit diagram</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    margin: 0;
    padding: 24px;
    max-width: 900px;
  }
  h1 { font-size: 20px; font-weight: 500; margin: 0 0 4px; }
  p.sub { font-size: 13px; color: #888; margin: 0 0 20px; }
  svg { width: 100%; height: auto; display: block; }

  /* node hover */
  .node { cursor: pointer; }
  .node:hover { opacity: 0.85; }

  /* color ramps — light mode */
  .c-blue   rect, .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue   text.th { fill: #0C447C; }
  .c-blue   text.ts { fill: #185FA5; }

  .c-teal   rect, .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal   text.th { fill: #085041; }
  .c-teal   text.ts { fill: #0F6E56; }

  .c-purple rect, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text.th { fill: #3C3489; }
  .c-purple text.ts { fill: #534AB7; }

  .c-coral  rect, .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
  .c-coral  text.th { fill: #712B13; }
  .c-coral  text.ts { fill: #993C1D; }

  .c-amber  rect, .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber  text.th { fill: #633806; }
  .c-amber  text.ts { fill: #854F0B; }

  .c-gray   rect, .c-gray   ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray   text.th { fill: #444441; }
  .c-gray   text.ts { fill: #5F5E5A; }

  text.th { font-size: 14px; font-weight: 500; }
  text.ts { font-size: 12px; font-weight: 400; }
  text     { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

  .arr  { stroke: #888780; stroke-width: 1.5; fill: none; }
  .leader { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; fill: none; }

  /* domain containers */
  .domain-blue { fill: #E6F1FB; stroke: #185FA5; fill-opacity: 0.25; stroke-width: 0.5; }
  .domain-teal { fill: #E1F5EE; stroke: #0F6E56; fill-opacity: 0.25; stroke-width: 0.5; }

  /* wire colors */
  .wire-5v    { stroke: #378ADD; stroke-width: 1.5; fill: none; }
  .wire-15v   { stroke: #1D9E75; stroke-width: 1.5; fill: none; }
  .wire-9v    { stroke: #1D9E75; stroke-width: 1.5; fill: none; }
  .wire-gnd   { stroke: #888780; stroke-width: 1; fill: none; }
  .wire-pgnd  { stroke: #888780; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  .bus-gnd    { stroke: #888780; stroke-width: 0.75; stroke-dasharray: 5 4; fill: none; }

  /* legend */
  .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; font-size: 12px; color: #555; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch-line { width: 28px; height: 2px; }
  .swatch-box  { width: 14px; height: 14px; border-radius: 3px; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e0e0e0; }
    p.sub { color: #666; }

    .c-blue   rect, .c-blue   ellipse { fill: #0C447C; stroke: #85B7EB; }
    .c-blue   text.th { fill: #B5D4F4; }
    .c-blue   text.ts { fill: #85B7EB; }

    .c-teal   rect, .c-teal   ellipse { fill: #085041; stroke: #5DCAA5; }
    .c-teal   text.th { fill: #9FE1CB; }
    .c-teal   text.ts { fill: #5DCAA5; }

    .c-purple rect, .c-purple ellipse { fill: #26215C; stroke: #AFA9EC; }
    .c-purple text.th { fill: #CECBF6; }
    .c-purple text.ts { fill: #AFA9EC; }

    .c-coral  rect, .c-coral  ellipse { fill: #4A1B0C; stroke: #F0997B; }
    .c-coral  text.th { fill: #F5C4B3; }
    .c-coral  text.ts { fill: #F0997B; }

    .c-amber  rect, .c-amber  ellipse { fill: #412402; stroke: #EF9F27; }
    .c-amber  text.th { fill: #FAC775; }
    .c-amber  text.ts { fill: #EF9F27; }

    .c-gray   rect, .c-gray   ellipse { fill: #2C2C2A; stroke: #B4B2A9; }
    .c-gray   text.th { fill: #D3D1C7; }
    .c-gray   text.ts { fill: #B4B2A9; }

    .domain-blue { fill: #0C447C; fill-opacity: 0.15; stroke: #85B7EB; }
    .domain-teal { fill: #085041; fill-opacity: 0.15; stroke: #5DCAA5; }
    .arr    { stroke: #888780; }
    .leader { stroke: #666; }
    .wire-gnd  { stroke: #666; }
    .wire-pgnd { stroke: #555; }
    .bus-gnd   { stroke: #555; }
    text.ts { fill: #aaa; }

    .legend { color: #aaa; }
  }
</style>
</head>
<body>

<h1>PSU HAT — circuit diagram</h1>
<p class="sub">5V (Pi GPIO or barrel jack) → ±15V isolated → 9V filtered output</p>

<svg viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-5v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-9v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Domain containers -->
  <rect x="30" y="40" width="180" height="210" rx="12" class="domain-blue"/>
  <text class="ts" x="42" y="58" dominant-baseline="central">Pi_GND domain</text>

  <rect x="30" y="270" width="620" height="320" rx="12" class="domain-teal"/>
  <text class="ts" x="42" y="288" dominant-baseline="central">ISO_GND domain (isolated)</text>

  <!-- ── J1 GPIO header ── -->
  <g class="node c-blue">
    <rect x="50" y="68" width="140" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="120" y="89" text-anchor="middle" dominant-baseline="central">J1 GPIO header</text>
    <text class="ts" x="120" y="108" text-anchor="middle" dominant-baseline="central">pins 2,4 = +5V · pin 6 = GND</text>
  </g>

  <!-- ── J6 barrel jack ── -->
  <g class="node c-blue">
    <rect x="50" y="155" width="140" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="120" y="176" text-anchor="middle" dominant-baseline="central">J6 barrel jack</text>
    <text class="ts" x="120" y="196" text-anchor="middle" dominant-baseline="central">tip = +5V · sleeve = GND</text>
  </g>

  <!-- J1 +5V to D3 anode -->
  <line x1="190" y1="90" x2="248" y2="90" class="wire-5v"/>
  <!-- J6 +5V up and join -->
  <path d="M190 176 L240 176 L240 90 L248 90" class="wire-5v"/>
  <circle cx="248" cy="90" r="4" fill="#378ADD"/>

  <!-- ── D3 Schottky ── -->
  <g class="node c-coral">
    <rect x="250" y="68" width="110" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="305" y="83" text-anchor="middle" dominant-baseline="central">D3 BAT54</text>
    <text class="ts" x="305" y="100" text-anchor="middle" dominant-baseline="central">Schottky protection</text>
  </g>

  <!-- +5V label -->
  <text class="ts" x="232" y="83" text-anchor="middle" dominant-baseline="central" fill="#378ADD">+5V</text>

  <!-- D3 cathode to C1/U1 junction -->
  <line x1="360" y1="90" x2="410" y2="90" class="wire-5v"/>
  <circle cx="410" cy="90" r="4" fill="#378ADD"/>

  <!-- ── C1 bypass ── -->
  <g class="node c-gray">
    <rect x="412" y="68" width="90" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="457" y="83" text-anchor="middle" dominant-baseline="central">C1 100nF</text>
    <text class="ts" x="457" y="100" text-anchor="middle" dominant-baseline="central">input bypass</text>
  </g>
  <line x1="457" y1="112" x2="457" y2="138" class="wire-gnd"/>
  <text class="ts" x="470" y="133" dominant-baseline="central" fill="#888780">Pi_GND</text>

  <!-- +5V wire to U1 -->
  <line x1="410" y1="90" x2="555" y2="90" class="wire-5v"/>

  <!-- ── U1 NMH0515SC ── -->
  <g class="node c-purple">
    <rect x="480" y="300" width="170" height="72" rx="6" stroke-width="0.5"/>
    <text class="th" x="565" y="321" text-anchor="middle" dominant-baseline="central">U1 NMH0515SC</text>
    <text class="ts" x="565" y="341" text-anchor="middle" dominant-baseline="central">5V → ±15V isolated · SIP-7</text>
    <text class="ts" x="565" y="358" text-anchor="middle" dominant-baseline="central">2W max</text>
  </g>

  <!-- +5V down into U1 -->
  <line x1="555" y1="90" x2="555" y2="299" class="wire-5v" marker-end="url(#arrow-5v)"/>
  <text class="ts" x="560" y="200" dominant-baseline="central" fill="#378ADD">+5V in</text>

  <!-- Pi_GND to U1 −Vin -->
  <path d="M120 240 L120 336 L479 336" class="wire-pgnd" marker-end="url(#arrow)"/>
  <text class="ts" x="270" y="328" dominant-baseline="central" fill="#888780">Pi_GND (−Vin)</text>

  <!-- ── C2 220uF ── -->
  <g class="node c-amber">
    <rect x="340" y="300" width="120" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="400" y="315" text-anchor="middle" dominant-baseline="central">C2 220µF</text>
    <text class="ts" x="400" y="332" text-anchor="middle" dominant-baseline="central">+15V filter</text>
  </g>

  <!-- +15V bus from U1 -->
  <path d="M480 315 L461 315 L461 322" class="wire-15v"/>
  <line x1="340" y1="322" x2="461" y2="322" class="wire-15v"/>
  <circle cx="461" cy="322" r="3" fill="#1D9E75"/>
  <text class="ts" x="388" y="310" text-anchor="middle" dominant-baseline="central" fill="#1D9E75">+15V</text>

  <!-- ── R2 dummy load ── -->
  <g class="node c-gray">
    <rect x="340" y="364" width="120" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="400" y="379" text-anchor="middle" dominant-baseline="central">R2 2.2kΩ</text>
    <text class="ts" x="400" y="396" text-anchor="middle" dominant-baseline="central">−15V dummy load</text>
  </g>
  <path d="M480 358 L461 358 L461 386 L340 386" class="wire-gnd"/>
  <text class="ts" x="388" y="374" text-anchor="middle" dominant-baseline="central" fill="#888780">−15V</text>

  <!-- ISO_GND bus lines -->
  <line x1="50" y1="440" x2="630" y2="440" class="bus-gnd"/>
  <text class="ts" x="55" y="436" dominant-baseline="central" fill="#888780">ISO_GND</text>

  <!-- Verticals to ISO_GND -->
  <line x1="400" y1="344" x2="400" y2="440" class="wire-gnd"/>
  <line x1="400" y1="408" x2="400" y2="440" class="wire-gnd"/>
  <line x1="565" y1="372" x2="565" y2="440" class="wire-gnd"/>

  <!-- ── C3 + C4 input caps ── -->
  <g class="node c-gray">
    <rect x="50" y="300" width="120" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="110" y="315" text-anchor="middle" dominant-baseline="central">C3 + C4</text>
    <text class="ts" x="110" y="332" text-anchor="middle" dominant-baseline="central">10µF + 100nF in</text>
  </g>
  <path d="M340 322 L200 322 L170 322" class="wire-15v" marker-end="url(#arrow-9v)"/>
  <line x1="110" y1="344" x2="110" y2="440" class="wire-gnd"/>

  <!-- ── U2 MC7809CTG ── -->
  <g class="node c-purple">
    <rect x="200" y="290" width="120" height="56" rx="6" stroke-width="0.5"/>
    <text class="th" x="260" y="308" text-anchor="middle" dominant-baseline="central">U2 MC7809</text>
    <text class="ts" x="260" y="326" text-anchor="middle" dominant-baseline="central">+15V → +9V linear</text>
    <text class="ts" x="260" y="342" text-anchor="middle" dominant-baseline="central">TO-220-3</text>
  </g>
  <line x1="260" y1="346" x2="260" y2="440" class="wire-gnd"/>

  <!-- ── C5 output bypass ── -->
  <g class="node c-amber">
    <rect x="200" y="460" width="120" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="260" y="475" text-anchor="middle" dominant-baseline="central">C5 10µF</text>
    <text class="ts" x="260" y="492" text-anchor="middle" dominant-baseline="central">output bypass</text>
  </g>
  <line x1="260" y1="346" x2="260" y2="460" class="wire-9v" marker-end="url(#arrow-9v)"/>
  <text class="ts" x="266" y="410" dominant-baseline="central" fill="#1D9E75">+9V</text>
  <circle cx="260" cy="482" r="3" fill="#1D9E75"/>
  <line x1="260" y1="504" x2="260" y2="560" class="wire-gnd"/>

  <!-- ── R1 + C6 RC filter ── -->
  <g class="node c-gray">
    <rect x="350" y="460" width="140" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="420" y="475" text-anchor="middle" dominant-baseline="central">R1 10Ω + C6 470µF</text>
    <text class="ts" x="420" y="492" text-anchor="middle" dominant-baseline="central">RC noise filter</text>
  </g>
  <line x1="260" y1="482" x2="349" y2="482" class="wire-9v" marker-end="url(#arrow-9v)"/>
  <line x1="420" y1="504" x2="420" y2="560" class="wire-gnd"/>

  <!-- ── J_OUT ── -->
  <g class="node c-teal">
    <rect x="516" y="458" width="130" height="58" rx="6" stroke-width="0.5"/>
    <text class="th" x="581" y="476" text-anchor="middle" dominant-baseline="central">J_OUT header</text>
    <text class="ts" x="581" y="494" text-anchor="middle" dominant-baseline="central">+9V_filt · ISO_GND</text>
    <text class="ts" x="581" y="510" text-anchor="middle" dominant-baseline="central">to preamp board</text>
  </g>
  <path d="M490 482 L515 482" class="wire-9v" marker-end="url(#arrow-9v)"/>
  <text class="ts" x="500" y="474" text-anchor="middle" dominant-baseline="central" fill="#1D9E75">+9V_filt</text>
  <line x1="581" y1="560" x2="581" y2="516" class="wire-gnd" marker-end="url(#arrow)"/>

  <!-- Lower ISO_GND bus -->
  <line x1="50" y1="560" x2="630" y2="560" class="bus-gnd"/>
  <text class="ts" x="55" y="556" dominant-baseline="central" fill="#888780">ISO_GND</text>

</svg>

<div class="legend">
  <div class="legend-item">
    <div class="swatch-line" style="background:#378ADD"></div>
    <span>+5V (Pi_GND domain)</span>
  </div>
  <div class="legend-item">
    <div class="swatch-line" style="background:#1D9E75"></div>
    <span>+15V / +9V (ISO_GND domain)</span>
  </div>
  <div class="legend-item">
    <div class="swatch-line" style="background:#888780"></div>
    <span>GND returns</span>
  </div>
  <div class="legend-item">
    <div class="swatch-box" style="background:#EEEDFE; border:1px solid #534AB7"></div>
    <span>Active ICs</span>
  </div>
  <div class="legend-item">
    <div class="swatch-box" style="background:#FAEEDA; border:1px solid #854F0B"></div>
    <span>Polarized caps</span>
  </div>
  <div class="legend-item">
    <div class="swatch-box" style="background:#F1EFE8; border:1px solid #5F5E5A"></div>
    <span>Non-polarized / resistors</span>
  </div>
</div>

</body>
</html>
